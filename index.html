<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprint</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  :root {
    --bg: #09090b; --surface: #111113; --surface-hover: #18181b;
    --border: #1e1e22; --border-subtle: #151518;
    --text: #ececee; --text-secondary: #7c7c85; --text-muted: #4a4a52;
    --accent: #8b5cf6; --accent-glow: rgba(139, 92, 246, 0.15);
    --red: #ef4444; --red-bg: rgba(239, 68, 68, 0.08);
    --orange: #f59e0b; --orange-bg: rgba(245, 158, 11, 0.08);
    --blue: #3b82f6; --blue-bg: rgba(59, 130, 246, 0.08);
    --green: #22c55e; --green-bg: rgba(34, 197, 94, 0.08);
    --purple: #a78bfa; --purple-bg: rgba(167, 139, 250, 0.08);
    --yellow: #eab308; --yellow-bg: rgba(234, 179, 8, 0.08);
    --radius: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
  .container { max-width: 640px; margin: 0 auto; padding: 40px 20px 80px; }
  .header { margin-bottom: 24px; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  .recap-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text-secondary); font-size: 11px; font-weight: 600; font-family: inherit; padding: 6px 12px; cursor: pointer; transition: all 0.15s ease; text-transform: uppercase; letter-spacing: 0.5px; }
  .recap-btn:hover { background: var(--surface-hover); color: var(--text); border-color: var(--accent); }
  .header .date { font-size: 13px; color: var(--text-muted); }
  .recap-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; padding: 20px; overflow-y: auto; }
  .recap-modal.show { display: flex; align-items: flex-start; justify-content: center; }
  .recap-content { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); max-width: 600px; width: 100%; margin: 40px auto; padding: 24px; position: relative; }
  .recap-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; padding: 4px 8px; line-height: 1; }
  .recap-close:hover { color: var(--text); }
  .recap-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
  .recap-day { margin-bottom: 24px; }
  .recap-day-header { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .recap-task { font-size: 13px; color: var(--text-secondary); padding: 6px 0; border-bottom: 1px solid var(--border-subtle); }
  .recap-task:last-child { border-bottom: none; }
  .recap-empty { text-align: center; color: var(--text-muted); padding: 40px 20px; font-size: 13px; }
  .progress-wrap { margin-bottom: 32px; }
  .progress-stats { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .progress-label { font-size: 12px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .progress-count { font-size: 13px; color: var(--text-secondary); font-weight: 500; font-variant-numeric: tabular-nums; }
  .progress-track { height: 3px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1); box-shadow: 0 0 12px var(--accent-glow); }
  .batch-controls { display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 24px; }
  .batch-indicator { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }
  .toggle-all-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text-secondary); font-size: 11px; font-weight: 600; font-family: inherit; padding: 6px 12px; cursor: pointer; transition: all 0.15s ease; text-transform: uppercase; letter-spacing: 0.5px; }
  .toggle-all-btn:hover { background: var(--surface-hover); color: var(--text); border-color: var(--accent); }
  .batch-complete-banner { background: linear-gradient(135deg, var(--accent), #a78bfa); padding: 16px; border-radius: var(--radius); text-align: center; margin-bottom: 20px; animation: slideDown 0.4s ease; display: none; }
  .batch-complete-banner.show { display: block; }
  .batch-complete-banner .emoji { font-size: 28px; margin-bottom: 4px; }
  .batch-complete-banner .msg { font-size: 14px; font-weight: 600; color: white; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  .section { margin-bottom: 24px; }
  .section.batch-hidden { display: none; }
  .section-header { display: flex; align-items: center; gap: 8px; padding: 0 0 10px 0; border-bottom: 1px solid var(--border-subtle); margin-bottom: 2px; }
  .section-indicator { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: #b0b0b8; }
  .section-count { font-size: 10px; color: #9898a0; margin-left: auto; font-variant-numeric: tabular-nums; }
  .task { display: flex; align-items: flex-start; gap: 12px; padding: 10px 8px; border-radius: var(--radius); transition: all 0.2s ease; cursor: default; border-bottom: 1px solid var(--border-subtle); position: relative; }
  .task:last-child { border-bottom: none; }
  .task:hover { background: var(--surface); }
  .task:hover .task-actions { opacity: 1; }
  .checkbox-wrap { position: relative; width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px; }
  .checkbox-wrap input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; z-index: 2; }
  .checkbox-visual { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--text-muted); transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1); display: flex; align-items: center; justify-content: center; }
  .checkbox-visual svg { width: 10px; height: 10px; opacity: 0; transform: scale(0.5); transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1); color: white; }
  .checkbox-wrap input:checked + .checkbox-visual { background: var(--accent); border-color: var(--accent); }
  .checkbox-wrap input:checked + .checkbox-visual svg { opacity: 1; transform: scale(1); }
  .checkbox-wrap input:hover + .checkbox-visual { border-color: var(--text-secondary); }
  .task-content { flex: 1; min-width: 0; }
  .task-name { font-size: 14px; font-weight: 500; line-height: 1.4; letter-spacing: -0.1px; color: #f0f0f0; }
  .task-detail { font-size: 12px; color: #9898a0; margin-top: 2px; line-height: 1.4; }
  .task.done .task-name { color: var(--text-muted); text-decoration: line-through; }
  .task.done .task-detail { opacity: 0.3; }
  .task.done { opacity: 0.5; }
  .task-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s ease; flex-shrink: 0; margin-top: 2px; }
  .action-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; color: var(--text-muted); font-size: 9px; font-weight: 600; font-family: inherit; padding: 3px 7px; cursor: pointer; transition: all 0.15s ease; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap; }
  .action-btn:hover { background: var(--surface-hover); color: var(--text-secondary); border-color: var(--text-muted); }
  .action-btn.tmrw:hover { color: var(--orange); border-color: var(--orange); background: var(--orange-bg); }
  .action-btn.later:hover { color: var(--blue); border-color: var(--blue); background: var(--blue-bg); }
  .tomorrow-section { display: none; }
  .tomorrow-section.has-items { display: block; }
  .tag { display: inline-flex; align-items: center; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 4px; margin-left: 6px; letter-spacing: 0.3px; vertical-align: middle; position: relative; top: -1px; }
  .tag-call { background: var(--orange-bg); color: var(--orange); }
  .tag-text { background: var(--green-bg); color: var(--green); }
  .tag-pay { background: var(--red-bg); color: var(--red); }
  .tag-draft { background: var(--blue-bg); color: var(--blue); }
  .tag-create { background: var(--purple-bg); color: var(--purple); }
  .tag-housing { background: var(--yellow-bg); color: var(--yellow); }
  .tag-source { opacity: 0.4; font-size: 9px; padding: 0px 5px; margin-left: 4px; }
  .tag-source-asana { background: var(--blue-bg); color: var(--blue); }
  .tag-source-airtable { background: var(--purple-bg); color: var(--purple); }
  .tag-source-manual { background: rgba(255,255,255,0.05); color: var(--text-muted); }
  .priority-now { background: var(--red); }
  .priority-next { background: var(--orange); }
  .priority-later { background: var(--blue); }
  .priority-low { background: var(--text-muted); }
  .priority-tmrw { background: var(--yellow); }
  .notes-section { margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--border); }
  .notes-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 8px; }
  .notes-area { width: 100%; min-height: 80px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; color: var(--text-secondary); font-family: inherit; font-size: 13px; line-height: 1.5; resize: vertical; outline: none; }
  .notes-area:focus { border-color: var(--accent); }
  .notes-area::placeholder { color: var(--text-muted); }
  .celebration { display: none; text-align: center; padding: 40px 20px; animation: fadeIn 0.5s ease; }
  .celebration.show { display: block; }
  .celebration .emoji { font-size: 48px; margin-bottom: 12px; }
  .celebration .msg { font-size: 16px; font-weight: 600; }
  .celebration .sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  .hint { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 24px; opacity: 0.5; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideOut { from { opacity: 1; max-height: 80px; } to { opacity: 0; max-height: 0; padding: 0; } }
  .task.moving { animation: slideOut 0.3s ease forwards; overflow: hidden; }
  @media (max-width: 480px) { .container { padding: 24px 16px 60px; } .task-actions { opacity: 1; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-top">
      <h1 id="sprintTitle"></h1>
      <button class="recap-btn" onclick="showWeeklyRecap()">This Week</button>
    </div>
    <div class="date" id="sprintDate"></div>
  </div>
  
  <div id="recapModal" class="recap-modal" onclick="if(event.target===this) hideWeeklyRecap()">
    <div class="recap-content">
      <button class="recap-close" onclick="hideWeeklyRecap()">×</button>
      <div class="recap-title">📊 This Week's Completed Tasks</div>
      <div id="recapContent">Loading...</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-stats">
      <span class="progress-label">Progress</span>
      <span class="progress-count"><span id="doneCount">0</span> of <span id="totalCount">0</span></span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
  </div>
  <div class="batch-controls">
    <span class="batch-indicator" id="batchIndicator">Batch 1 of 7</span>
    <button class="toggle-all-btn" id="toggleAllBtn" onclick="toggleShowAll()">Show all</button>
  </div>
  <div id="batchCompleteBanner" class="batch-complete-banner">
    <div class="emoji">✅</div>
    <div class="msg">Batch complete! Moving to next...</div>
  </div>
  <div id="celebration" class="celebration"><div class="emoji">🏁</div><div class="msg">Sprint complete.</div><div class="sub">Go enjoy your day.</div></div>
  <div id="sections"></div>
  <div class="section tomorrow-section" id="sec-tomorrow">
    <div class="section-header"><div class="section-indicator priority-tmrw"></div><span class="section-title">Tomorrow</span><span class="section-count"></span></div>
    <div id="tomorrow-tasks"></div>
  </div>
  <div class="notes-section"><div class="notes-label">Notes</div><textarea class="notes-area" id="notes" placeholder="Paste themes, attendee counts, anything..."></textarea></div>
  <div class="hint">Hover tasks for tmrw / later buttons. Checks saved locally + Supabase.</div>
</div>

<script>
// ============================================================
// SPRINT CONFIG — Change this to create a new sprint
// ============================================================
const SPRINT = {
  title: 'Thursday Sprint',
  date: 'March 5, 2026',
  key: 'sprint-2026-03-05',
  sections: [
    { id: 'batch1', title: '☀️ Morning — Deep Work + Fires', priority: 'now', batch: 1, tasks: [
      { id: 'morning-1', name: '🔥 Porsche (TOMORROW) — text guests confirmation + address, confirm RSVPs, deposit', detail: 'Airtable: text guests today, check RSVP count, confirm deposit paid.', tag: 'FIRE', tagClass: 'tag-call', source: 'airtable' },
      { id: 'morning-2', name: 'Seed 4 members for Friday group chat sparks (Aces + Insiders)', detail: 'Thursday = seed day. DM 4 members, ask for 2 questions each.', tag: 'DAILY', tagClass: 'tag-draft', source: 'asana' },
      { id: 'morning-3', name: 'Create Canva + Luma for Insiders SF (Mar 11, 6 DAYS)', detail: 'Need Vishal theme. Canva invite, Luma event, email + WhatsApp.', tag: 'CREATE', tagClass: 'tag-create', source: 'airtable' },
      { id: 'morning-4', name: 'Create Canva + Luma for Aces SF (Mar 12, Helen hosting)', detail: 'Helen @ 30 Lopez Ave, 8-12 capacity.', tag: 'CREATE', tagClass: 'tag-create', source: 'airtable' },
      { id: 'morning-5', name: 'Create Canva + Luma + announce Aces NY (Mar 17) + Insiders NY (Mar 18)', detail: 'Karl hosting Aces NY. Rob hosting Insiders NY.', tag: 'CREATE', tagClass: 'tag-create', source: 'airtable' },
      { id: 'morning-6', name: 'Build Insiders non-member pre/post dinner outreach system', detail: 'Template for pre-event brief + post-event pitch. Needed before Mar 11.', tag: 'PROJECT', tagClass: 'tag-create', source: 'carryforward' }
    ]},
    { id: 'batch2', title: '🌤️ Mid-Day — Outreach + Vendor Calls', priority: 'next', batch: 2, tasks: [
      { id: 'midday-1', name: '🔥 Book SF chef for Insiders (Mar 11) — Shabnam first', detail: 'Zero vendors booked. Call, do not just text.', tag: 'FIRE', tagClass: 'tag-call', source: 'airtable' },
      { id: 'midday-2', name: '🔥 Book SF chef for Aces (Mar 12)', detail: 'Same chef if available back-to-back, otherwise second.', tag: 'FIRE', tagClass: 'tag-call', source: 'airtable' },
      { id: 'midday-3', name: '🔥 Book SF photographer for both dinners', detail: 'One photographer for both nights if possible.', tag: 'FIRE', tagClass: 'tag-call', source: 'airtable' },
      { id: 'midday-4', name: 'Text Hannah — helper for both SF dinners', detail: 'Gold standard. Confirm Mar 11 + Mar 12.', tag: 'TEXT', tagClass: 'tag-call', source: 'airtable' },
      { id: 'midday-5', name: 'Text Vishal — Insiders SF dinner theme', detail: 'Host picks theme. Need before Canva/Luma finalize.', tag: 'TEXT', tagClass: 'tag-call', source: 'airtable' },
      { id: 'midday-6', name: 'Book NY vendors — Aces NY (Mar 17) chef + photographer + helper', detail: 'Karl hosting. Chef Moss? 12 days out.', tag: 'CALL', tagClass: 'tag-call', source: 'airtable' },
      { id: 'midday-7', name: 'Book NY vendors — Insiders NY (Mar 18) chef + photographer + helper', detail: 'Rob hosting. Same vendors as night before?', tag: 'CALL', tagClass: 'tag-call', source: 'airtable' },
      { id: 'midday-8', name: 'Deals chat mid-week reminder', detail: 'Overdue from Mar 4. Tag sharers, remind rest.', tag: 'SEND', tagClass: 'tag-draft', source: 'asana' },
      { id: 'midday-9', name: 'Ask Max — which Airbnb for SF trip', detail: 'Overdue from Mar 3.', tag: 'ASK', tagClass: 'tag-call', source: 'asana' }
    ]},
    { id: 'batch3', title: '🌆 Afternoon — Admin + Ops', priority: 'later', batch: 3, tasks: [
      { id: 'afternoon-1', name: 'Catch up on receipts', detail: 'Overdue since Mar 3.', tag: 'ADMIN', tagClass: '', source: 'asana' },
      { id: 'afternoon-2', name: 'Check finance email', detail: 'Overdue since Feb 27.', tag: 'ADMIN', tagClass: '', source: 'asana' },
      { id: 'afternoon-3', name: 'Pay invoices', detail: 'Overdue since Feb 27.', tag: 'ADMIN', tagClass: '', source: 'asana' },
      { id: 'afternoon-4', name: 'Check billing/payment issues Notion', detail: 'Overdue since Feb 27.', tag: 'ADMIN', tagClass: '', source: 'asana' },
      { id: 'afternoon-5', name: 'Deals chat: weekly activity + add strikes', detail: 'Overdue from Mar 1.', tag: 'ADMIN', tagClass: '', source: 'asana' },
      { id: 'afternoon-6', name: 'Danielle offboarding', detail: 'No due date, sitting in Asana.', tag: 'ADMIN', tagClass: '', source: 'asana' }
    ]},
    { id: 'batch4', title: '📌 Backlog — If Time', priority: 'backlog', batch: 4, tasks: [
      { id: 'backlog-1', name: 'Book flights to SF (Mar 11-12)', detail: '6 days out.', tag: '', tagClass: '', source: 'asana' },
      { id: 'backlog-2', name: 'Book LA vendors — Insiders LA (Mar 20) + Aces LA (Mar 27)', detail: '15-22 days out.', tag: '', tagClass: '', source: 'airtable' },
      { id: 'backlog-3', name: 'Finalize yearly trip attendees doc + send', detail: 'Sage Lodge May 27-29.', tag: '', tagClass: '', source: 'asana' },
      { id: 'backlog-4', name: 'Find yearly trip gift', detail: 'Gift for ~40 attendees.', tag: '', tagClass: '', source: 'asana' },
      { id: 'backlog-5', name: 'Redo storyteller doc in Notion', detail: 'Due today per Asana.', tag: '', tagClass: '', source: 'asana' },
      { id: 'backlog-6', name: 'Create photo sharing system', detail: 'Best photos + sharing with group.', tag: '', tagClass: '', source: 'asana' },
      { id: 'backlog-7', name: 'Start planning April events', detail: 'Shawn Xu Apr 16 SF confirmed.', tag: '', tagClass: '', source: 'asana' }
    ]}
  ]
};

// ============================================================
// SUPABASE (enhanced with completed_at tracking)
// ============================================================
const SB_URL = 'https://cfnuhjfceceojfykznnm.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmbnVoamZjZWNlb2pmeWt6bm5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MDUyNjYsImV4cCI6MjA4Nzk4MTI2Nn0.knZfJwibeGHrbI8xQZ7zeV-Fo7T3_RoAmBdx_HwgpEc';
let sb = null;
try { if (window.supabase) sb = window.supabase.createClient(SB_URL, SB_KEY); } catch(e) {}

// ============================================================
// STATE
// ============================================================
const STORAGE = SPRINT.key;
const NOTES_STORAGE = SPRINT.key + '-notes';
const TOMORROW_STORAGE = SPRINT.key + '-tomorrow';
const BATCH_STORAGE = SPRINT.key + '-batch';
let state = JSON.parse(localStorage.getItem(STORAGE) || '{}');
let tomorrowItems = JSON.parse(localStorage.getItem(TOMORROW_STORAGE) || '[]');
let currentBatch = parseInt(localStorage.getItem(BATCH_STORAGE) || '1');
let showAllBatches = false;

// ============================================================
// RENDER
// ============================================================
document.getElementById('sprintTitle').textContent = SPRINT.title;
document.getElementById('sprintDate').textContent = SPRINT.date;

const sectionsEl = document.getElementById('sections');
const checkSvg = '<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2.5 6l2.5 2.5 4.5-5"/></svg>';

SPRINT.sections.forEach(sec => {
  const secEl = document.createElement('div');
  secEl.className = 'section';
  secEl.id = 'sec-' + sec.id;
  secEl.dataset.batch = sec.batch;
  secEl.innerHTML = `<div class="section-header"><div class="section-indicator priority-${sec.priority}"></div><span class="section-title">${sec.title}</span><span class="section-count"></span></div>`;
  
  sec.tasks.forEach(task => {
    if (tomorrowItems.find(t => t.id === task.id)) return;
    const isDone = !!state[task.id];
    const sourceTag = task.source ? `<span class="tag tag-source tag-source-${task.source}">${task.source}</span>` : '';
    const div = document.createElement('div');
    div.className = 'task' + (isDone ? ' done' : '');
    div.dataset.id = task.id;
    div.dataset.name = task.name;
    div.dataset.source = task.source || 'manual';
    div.innerHTML = `
      <div class="checkbox-wrap">
        <input type="checkbox" ${isDone ? 'checked' : ''}>
        <div class="checkbox-visual">${checkSvg}</div>
      </div>
      <div class="task-content">
        <div class="task-name">${task.name} ${task.tag ? `<span class="tag ${task.tagClass}">${task.tag}</span>` : ''} ${sourceTag}</div>
        ${task.detail ? `<div class="task-detail">${task.detail}</div>` : ''}
      </div>
      <div class="task-actions">
        <button class="action-btn tmrw" onclick="moveToTomorrow('${task.id}')">tmrw</button>
        <button class="action-btn later" onclick="moveToEnd('${task.id}')">later</button>
      </div>`;
    secEl.appendChild(div);
  });
  
  sectionsEl.appendChild(secEl);
});

// Notes (synced to Supabase)
const notesEl = document.getElementById('notes');
notesEl.value = localStorage.getItem(NOTES_STORAGE) || '';
let notesTimeout = null;
notesEl.addEventListener('input', () => {
  localStorage.setItem(NOTES_STORAGE, notesEl.value);
  clearTimeout(notesTimeout);
  notesTimeout = setTimeout(() => syncNotesToSupabase(notesEl.value), 1500);
});

async function syncNotesToSupabase(text) {
  if (!sb) return;
  try {
    await sb.from('sprint_notes').upsert({
      sprint_key: SPRINT.key,
      notes: text,
      updated_at: new Date().toISOString()
    }, { onConflict: 'sprint_key' });
  } catch(e) { console.error('Notes sync error:', e); }
}

// Load notes from Supabase on startup
(async () => {
  if (!sb) return;
  try {
    const { data } = await sb.from('sprint_notes').select('notes').eq('sprint_key', SPRINT.key).single();
    if (data && data.notes && !notesEl.value) {
      notesEl.value = data.notes;
      localStorage.setItem(NOTES_STORAGE, data.notes);
    }
  } catch(e) { /* silent - table may not exist yet */ }
})();

// Render tomorrow
renderTomorrow();
updateBatchVisibility();
updateProgress();

// ============================================================
// BATCH SYSTEM
// ============================================================
function updateBatchVisibility() {
  const sections = document.querySelectorAll('.section[data-batch]');
  sections.forEach(sec => {
    const batch = parseInt(sec.dataset.batch);
    if (showAllBatches || batch === currentBatch) {
      sec.classList.remove('batch-hidden');
    } else {
      sec.classList.add('batch-hidden');
    }
  });
  
  document.getElementById('batchIndicator').textContent = showAllBatches ? 'All batches' : `Batch ${currentBatch} of 7`;
  document.getElementById('toggleAllBtn').textContent = showAllBatches ? 'Show current' : 'Show all';
}

function toggleShowAll() {
  showAllBatches = !showAllBatches;
  updateBatchVisibility();
  updateProgress();
}

function checkBatchComplete() {
  if (showAllBatches) return;
  
  const currentSection = document.querySelector(`.section[data-batch="${currentBatch}"]`);
  if (!currentSection) return;
  
  const tasks = currentSection.querySelectorAll('.task[data-id]');
  if (tasks.length === 0) return;
  
  let allDone = true;
  tasks.forEach(t => {
    if (!t.querySelector('input:checked')) allDone = false;
  });
  
  if (allDone && currentBatch < 7) {
    const banner = document.getElementById('batchCompleteBanner');
    banner.classList.add('show');
    
    setTimeout(() => {
      banner.classList.remove('show');
      currentBatch++;
      localStorage.setItem(BATCH_STORAGE, currentBatch);
      updateBatchVisibility();
      updateProgress();
    }, 1500);
  }
}

// ============================================================
// CHECKBOX HANDLER (enhanced with completed_at)
// ============================================================
document.addEventListener('change', e => {
  if (e.target.type !== 'checkbox') return;
  const task = e.target.closest('.task');
  if (!task) return;
  const id = task.dataset.id;
  const done = e.target.checked;
  const taskName = task.dataset.name;
  const taskSource = task.dataset.source || 'manual';
  
  task.classList.toggle('done', done);
  
  if (done) state[id] = true;
  else delete state[id];
  
  localStorage.setItem(STORAGE, JSON.stringify(state));
  updateProgress();
  syncToSupabase(id, done, taskName, taskSource);
  if (done && id.startsWith('at-')) syncVendorStatus(id, taskName);
  checkBatchComplete();
});

// Vendor reach-out tracking: when a vendor task is checked off, update vendor_tracking
async function syncVendorStatus(taskId, taskName) {
  if (!sb) return;
  // Parse task ID: at-{city}-{community}-{type}
  const parts = taskId.split('-');
  if (parts.length < 4) return;
  const cityCode = parts[1]; // sf, ny, la
  const commCode = parts[2]; // aces, ins
  const vendorType = parts[3]; // chef, photo, helper
  
  const cityMap = { sf: 'SF', ny: 'NY', la: 'LA' };
  const commMap = { aces: 'Aces', ins: 'Insiders' };
  const typeMap = { chef: 'chef', photo: 'photographer', helper: 'helper' };
  
  const city = cityMap[cityCode];
  const community = commMap[commCode];
  const vType = typeMap[vendorType];
  if (!city || !community || !vType) return;
  
  try {
    await sb.from('vendor_tracking')
      .update({ status: 'reached_out', reached_out_at: new Date().toISOString(), updated_at: new Date().toISOString() })
      .eq('city', city)
      .eq('community', community)
      .eq('vendor_type', vType);
  } catch(e) { console.error('Vendor sync error:', e); }
}

// ============================================================
// MOVE TO TOMORROW
// ============================================================
function moveToTomorrow(id) {
  const task = document.querySelector(`.task[data-id="${id}"]`);
  if (!task) return;
  const nameEl = task.querySelector('.task-name');
  const detailEl = task.querySelector('.task-detail');
  
  task.classList.add('moving');
  setTimeout(() => {
    task.remove();
    tomorrowItems.push({ id, name: nameEl.innerHTML, detail: detailEl ? detailEl.textContent : '' });
    localStorage.setItem(TOMORROW_STORAGE, JSON.stringify(tomorrowItems));
    // Sync to Supabase so sprint builder can pick it up
    syncTomorrowToSupabase(id);
    renderTomorrow();
    updateProgress();
    checkBatchComplete();
  }, 300);
}

async function syncTomorrowToSupabase(taskId) {
  if (!sb) return;
  try {
    await sb.from('tasks').update({ moved_to: 'tomorrow' }).eq('task_id', taskId).eq('sprint_key', SPRINT.key);
  } catch(e) { console.error('Tomorrow sync error:', e); }
}

function moveToEnd(id) {
  const task = document.querySelector(`.task[data-id="${id}"]`);
  if (!task) return;
  // Find the last batch section
  const allBatches = document.querySelectorAll('.section[data-batch]');
  const lastBatch = allBatches[allBatches.length - 1];
  if (!lastBatch) return;
  task.classList.add('moving');
  setTimeout(() => { 
    task.classList.remove('moving'); 
    lastBatch.appendChild(task); 
    updateProgress();
    checkBatchComplete();
  }, 300);
}

function undoTomorrow(id) {
  tomorrowItems = tomorrowItems.filter(t => t.id !== id);
  localStorage.setItem(TOMORROW_STORAGE, JSON.stringify(tomorrowItems));
  // Clear Supabase flag
  if (sb) {
    sb.from('tasks').update({ moved_to: null }).eq('task_id', id).eq('sprint_key', SPRINT.key).then(() => {}).catch(() => {});
  }
  location.reload();
}

function renderTomorrow() {
  const container = document.getElementById('tomorrow-tasks');
  const section = document.getElementById('sec-tomorrow');
  container.innerHTML = '';
  tomorrowItems.forEach(item => {
    const div = document.createElement('div');
    div.className = 'task';
    div.style.opacity = '0.5';
    div.innerHTML = `<div class="task-content"><div class="task-name" style="font-size:13px">${item.name}</div>${item.detail ? `<div class="task-detail">${item.detail}</div>` : ''}</div><div class="task-actions" style="opacity:1"><button class="action-btn" onclick="undoTomorrow('${item.id}')" style="color:var(--accent)">undo</button></div>`;
    container.appendChild(div);
  });
  section.classList.toggle('has-items', tomorrowItems.length > 0);
}

// ============================================================
// PROGRESS
// ============================================================
function updateProgress() {
  const tasks = document.querySelectorAll('.task[data-id]');
  let total = 0, done = 0;
  tasks.forEach(t => { total++; if (t.querySelector('input:checked')) done++; });
  
  document.getElementById('totalCount').textContent = total;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('progressBar').style.width = total ? (done / total * 100) + '%' : '0%';
  document.getElementById('celebration').classList.toggle('show', done === total && total > 0);
  
  document.querySelectorAll('.section[id^="sec-"]').forEach(sec => {
    const sTasks = sec.querySelectorAll('.task[data-id]');
    let sT = 0, sD = 0;
    sTasks.forEach(t => { sT++; if (t.querySelector('input:checked')) sD++; });
    const countEl = sec.querySelector('.section-count');
    if (countEl) countEl.textContent = sT > 0 ? sD + '/' + sT : '';
  });
}

// ============================================================
// WEEKLY RECAP
// ============================================================
async function showWeeklyRecap() {
  const modal = document.getElementById('recapModal');
  const content = document.getElementById('recapContent');
  modal.classList.add('show');
  content.innerHTML = 'Loading...';
  
  if (!sb) {
    content.innerHTML = '<div class="recap-empty">Supabase not available</div>';
    return;
  }
  
  try {
    const weekAgo = new Date();
    weekAgo.setDate(weekAgo.getDate() - 7);
    
    const { data, error } = await sb
      .from('tasks')
      .select('task_id, name, completed_at, sprint_key, source')
      .gte('completed_at', weekAgo.toISOString())
      .order('completed_at', { ascending: false });
    
    if (error) throw error;
    
    if (!data || data.length === 0) {
      content.innerHTML = '<div class="recap-empty">No completed tasks this week</div>';
      return;
    }
    
    // Group by day
    const byDay = {};
    data.forEach(task => {
      const date = new Date(task.completed_at).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      if (!byDay[date]) byDay[date] = [];
      byDay[date].push(task);
    });
    
    let html = '';
    Object.keys(byDay).forEach(day => {
      html += `<div class="recap-day">`;
      html += `<div class="recap-day-header">${day} (${byDay[day].length})</div>`;
      byDay[day].forEach(task => {
        const sourceTag = task.source ? `<span class="tag tag-source tag-source-${task.source}">${task.source}</span>` : '';
        html += `<div class="recap-task">✓ ${task.name} ${sourceTag}</div>`;
      });
      html += `</div>`;
    });
    
    content.innerHTML = html;
  } catch (e) {
    content.innerHTML = `<div class="recap-empty">Error loading recap: ${e.message}</div>`;
  }
}

function hideWeeklyRecap() {
  document.getElementById('recapModal').classList.remove('show');
}

// ============================================================
// SUPABASE SYNC (with completed_at + sprint_key + source)
// Composite unique key: (task_id, sprint_key)
// ============================================================

// Track completed_at timestamps locally so undos preserve original completion time
const COMPLETED_TS_STORAGE = SPRINT.key + '-completed-ts';
let completedTimestamps = JSON.parse(localStorage.getItem(COMPLETED_TS_STORAGE) || '{}');

function saveCompletedTimestamps() {
  localStorage.setItem(COMPLETED_TS_STORAGE, JSON.stringify(completedTimestamps));
}

async function syncToSupabase(taskId, done, taskName, taskSource) {
  if (!sb) return;
  try {
    const now = new Date().toISOString();
    
    // Track completion timestamp locally
    if (done && !completedTimestamps[taskId]) {
      completedTimestamps[taskId] = now;
      saveCompletedTimestamps();
    } else if (!done) {
      delete completedTimestamps[taskId];
      saveCompletedTimestamps();
    }
    
    const payload = {
      task_id: taskId,
      name: taskName,
      done: done,
      sprint_key: SPRINT.key,
      source: taskSource || 'manual',
      updated_at: now,
      completed_at: done ? (completedTimestamps[taskId] || now) : null
    };
    
    const { error } = await sb.from('tasks').upsert(payload, { onConflict: 'task_id,sprint_key' });
    if (error) console.error('Supabase sync error:', error);
  } catch(e) { console.error('Supabase sync error:', e); }
}

// Bulk sync ALL tasks on page unload (catches anything missed)
function bulkSyncAllTasks() {
  if (!sb) return;
  const allTasks = document.querySelectorAll('.task[data-id]');
  const rows = [];
  allTasks.forEach(t => {
    const id = t.dataset.id;
    const name = t.dataset.name;
    const source = t.dataset.source || 'manual';
    const done = !!state[id];
    rows.push({
      task_id: id,
      name: name,
      done: done,
      sprint_key: SPRINT.key,
      source: source,
      updated_at: new Date().toISOString(),
      completed_at: done ? (completedTimestamps[id] || new Date().toISOString()) : null
    });
  });
  if (rows.length === 0) return;
  // Use sendBeacon for reliable unload sync
  const url = SB_URL + '/rest/v1/tasks?on_conflict=task_id,sprint_key';
  const headers = {
    'apikey': SB_KEY,
    'Authorization': 'Bearer ' + SB_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'resolution=merge-duplicates'
  };
  try {
    const blob = new Blob([JSON.stringify(rows)], { type: 'application/json' });
    // sendBeacon doesn't support custom headers, so use fetch with keepalive
    fetch(url, { method: 'POST', headers: headers, body: JSON.stringify(rows), keepalive: true })
      .catch(() => {});
  } catch(e) {}
}

// Sync on page unload, visibility change, and periodically
window.addEventListener('beforeunload', bulkSyncAllTasks);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') bulkSyncAllTasks();
});
// Auto-sync every 2 minutes
setInterval(bulkSyncAllTasks, 120000);

// Load state from Supabase on startup (scoped to current sprint_key)
(async () => {
  if (!sb) return;
  try {
    const { data } = await sb.from('tasks')
      .select('task_id, done, completed_at')
      .eq('sprint_key', SPRINT.key)
      .eq('done', true);
    if (data) {
      let changed = false;
      data.forEach(row => {
        if (!state[row.task_id]) { state[row.task_id] = true; changed = true; }
        if (row.completed_at && !completedTimestamps[row.task_id]) {
          completedTimestamps[row.task_id] = row.completed_at;
        }
      });
      if (changed) {
        localStorage.setItem(STORAGE, JSON.stringify(state));
        saveCompletedTimestamps();
        document.querySelectorAll('.task[data-id]').forEach(t => {
          const id = t.dataset.id;
          if (state[id]) { t.classList.add('done'); t.querySelector('input').checked = true; }
        });
        updateProgress();
      }
    }
  } catch(e) { /* silent */ }
})();

// Initial bulk sync on load (seeds all tasks into Supabase so we have the full picture)
setTimeout(bulkSyncAllTasks, 3000);
</script>
